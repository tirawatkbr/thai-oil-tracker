name: 🛢️ Daily Oil Price Update

on:
  # รันอัตโนมัติทุกวัน 06:05 น. (เวลาไทย = UTC+7 → 23:05 UTC วันก่อน)
  schedule:
    - cron: "5 23 * * *"

  # รันได้ manual จาก GitHub Actions tab
  workflow_dispatch:
    inputs:
      force_update:
        description: "Force update even if data exists today"
        required: false
        default: "false"
        type: boolean

jobs:
  scrape-and-update:
    name: Scrape Oil Prices & Update Sheets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Permission เพื่อ commit กลับ repo
    permissions:
      contents: write

    steps:
      # ── 1. Checkout repo ───────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Setup Python ────────────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ────────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt

      # ── 4. Run scraper ─────────────────────────────────────────────────
      - name: 🔍 Scrape oil prices
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
        run: |
          python scripts/scraper.py

      # ── 5. Commit JSON files back to repo ──────────────────────────────
      - name: 💾 Commit updated price data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add prices.json price_history.json
          git diff --staged --quiet || git commit -m "🛢️ อัปเดตราคาน้ำมัน $(date +'%Y-%m-%d %H:%M') [bot]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Summary ─────────────────────────────────────────────────────
      - name: 📊 Show summary
        run: |
          echo "### 🛢️ อัปเดตราคาน้ำมันสำเร็จ" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| รายการ | ค่า |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 วันที่ | $(TZ='Asia/Bangkok' date +'%Y-%m-%d') |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏰ เวลา | $(TZ='Asia/Bangkok' date +'%H:%M') น. |" >> $GITHUB_STEP_SUMMARY
          echo "| 📁 ไฟล์ | prices.json, price_history.json |" >> $GITHUB_STEP_SUMMARY
          if [ -f prices.json ]; then
            SIZE=$(wc -c < prices.json)
            echo "| 📦 ขนาดไฟล์ | ${SIZE} bytes |" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 7. Notify on failure (optional) ───────────────────────────────
      - name: 🚨 Notify on failure
        if: failure()
        run: |
          echo "❌ Scraper ล้มเหลว! ตรวจสอบ logs ด้านบน" >> $GITHUB_STEP_SUMMARY
