<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ราคาน้ำมันไทย</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0c0c0c;
  --bg1:      #111111;
  --bg2:      #161616;
  --bg3:      #1c1c1c;
  --line:     #202020;
  --line2:    #2a2a2a;
  --text:     #ececec;
  --text2:    #a0a0a0;
  --text3:    #555555;
  --accent:   #d4a843;
  --up:       #4caf82;
  --down:     #cf6679;
  --up-bg:    rgba(76,175,130,.1);
  --down-bg:  rgba(207,102,121,.1);
  --mono:     'JetBrains Mono', monospace;
  --sans:     'Noto Sans Thai', sans-serif;
  --r:        6px;
  --r2:       10px;
}

html { font-size: 14px; scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.6; min-height: 100vh; }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }

/* ─── HEADER ─── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 60px;
  border-bottom: 1px solid var(--line);
  position: sticky; top: 0; z-index: 200;
  background: rgba(12,12,12,.92);
  backdrop-filter: blur(16px);
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 34px; height: 34px; border-radius: var(--r);
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.logo-text-main {
  font-size: 15px; font-weight: 700; color: var(--text);
  letter-spacing: -.02em; line-height: 1.2;
}
.logo-text-sub {
  font-family: var(--mono); font-size: 9px; color: var(--text3);
  letter-spacing: .12em; text-transform: uppercase; line-height: 1;
}
.header-right { display: flex; align-items: center; gap: 16px; }
.live-badge {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  letter-spacing: .06em;
}
.pulse { width: 6px; height: 6px; background: var(--up); border-radius: 50%; animation: blink 2.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.7)} }
.update-time { font-family: var(--mono); font-size: 10px; color: var(--text3); }

/* ─── WRAP ─── */
.wrap { max-width: 1320px; margin: 0 auto; padding: 32px 32px 64px; }

/* ─── SECTION LABEL ─── */
.section-label {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  color: var(--text3); letter-spacing: .14em; text-transform: uppercase;
  margin-bottom: 4px;
}
.section-title {
  font-size: 20px; font-weight: 700; color: var(--text);
  letter-spacing: -.02em; margin-bottom: 20px;
}
.section-title span { color: var(--accent); }

/* ─── OIL TYPE TABS ─── */
.oil-tabs-wrap { margin-bottom: 32px; }
.oil-tabs {
  display: flex; gap: 2px; flex-wrap: wrap;
  background: var(--bg1); border: 1px solid var(--line);
  border-radius: var(--r2); padding: 4px;
  width: fit-content;
}
.oil-tab {
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  color: var(--text3); background: transparent; border: none;
  padding: 7px 16px; border-radius: calc(var(--r2) - 2px);
  cursor: pointer; transition: all .18s; white-space: nowrap;
}
.oil-tab:hover { color: var(--text2); background: var(--bg2); }
.oil-tab.active { background: var(--bg3); color: var(--text); font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.4); }

/* ─── OVERVIEW SECTION ─── */
.overview-section { margin-bottom: 40px; }
.overview-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: var(--r2);
  overflow: hidden;
}
.overview-cell {
  background: var(--bg1);
  padding: 16px 14px;
  transition: background .15s;
}
.overview-cell:hover { background: var(--bg2); }
.ov-oil-name {
  font-family: var(--sans); font-size: 12px; font-weight: 700;
  color: var(--text2); letter-spacing: -.01em;
  margin-bottom: 10px; white-space: normal; line-height: 1.3;
}
.ov-brand-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px; gap: 6px;
}
.ov-brand-name {
  font-size: 11px; font-weight: 500; color: var(--text2);
  display: flex; align-items: center; gap: 5px;
}
.ov-brand-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.ov-price {
  font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text);
}
.ov-price.best { color: var(--accent); }
.ov-divider { height: 1px; background: var(--line); margin: 8px 0; }
.ov-best-label {
  font-family: var(--mono); font-size: 9px; color: var(--text3);
  letter-spacing: .06em; margin-bottom: 0px;
}
.ov-best-val { }

/* ─── CONTROLS ROW ─── */
.controls-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px; flex-wrap: wrap; gap: 12px;
}
.time-seg {
  display: flex; gap: 1px;
  background: var(--line); border: 1px solid var(--line);
  border-radius: var(--r); overflow: hidden;
}
.time-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  color: var(--text3); background: var(--bg1); border: none;
  padding: 7px 16px; cursor: pointer; transition: all .15s; letter-spacing: .06em;
}
.time-btn:hover { color: var(--text2); background: var(--bg2); }
.time-btn.active { background: var(--bg3); color: var(--text); }

/* ─── BRAND CARDS ─── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}
.brand-card {
  background: var(--bg1); border: 1px solid var(--line);
  border-radius: var(--r2); padding: 18px 18px 14px;
  transition: border-color .18s, background .18s;
  animation: riseIn .35s ease both;
  cursor: default;
}
@keyframes riseIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.brand-card:nth-child(2){animation-delay:.05s}.brand-card:nth-child(3){animation-delay:.09s}
.brand-card:nth-child(4){animation-delay:.13s}.brand-card:nth-child(5){animation-delay:.17s}
.brand-card:nth-child(6){animation-delay:.21s}
.brand-card:hover { border-color: var(--line2); background: var(--bg2); }

/* Card header */
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.brand-identity { display: flex; align-items: center; gap: 10px; }
.brand-logo-wrap {
  width: 40px; height: 40px; border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden;
  background: #ffffff;
  border: 1px solid var(--line2);
}

/* SVG Brand Logos */
.logo-ptt    { background: #003087; }
.logo-shell  { background: #fbce07; }
.logo-caltex { background: #cc0000; }
.logo-esso   { background: #da291c; }
.logo-bcp    { background: #004f9f; }
.logo-susco  { background: #6d1f7e; }

.brand-info {}
.brand-name-text {
  font-size: 14px; font-weight: 700; color: var(--text);
  letter-spacing: -.01em; line-height: 1.2;
}
.brand-name-sub { font-size: 11px; color: var(--text3); font-weight: 400; }

/* Change chip */
.chip {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  padding: 3px 8px; border-radius: 4px; letter-spacing: .04em; white-space: nowrap;
}
.chip-up   { background: var(--up-bg);   color: var(--up);   }
.chip-down { background: var(--down-bg); color: var(--down); }
.chip-flat { background: var(--bg3);     color: var(--text3); border: 1px solid var(--line2); }

/* Price display — hierarchy */
.card-price-section { margin-bottom: 12px; }
.price-value {
  font-family: var(--mono); font-size: 28px; font-weight: 700;
  color: var(--text); letter-spacing: -.04em; line-height: 1;
  display: flex; align-items: baseline; gap: 5px;
}
.price-unit { font-size: 11px; font-weight: 400; color: var(--text3); font-family: var(--sans); }
.price-change-row {
  display: flex; align-items: center; gap: 6px;
  margin-top: 5px;
}
.price-change-label { font-size: 11px; color: var(--text3); }
.price-change-val {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
}
.val-up   { color: var(--up); }
.val-down { color: var(--down); }
.val-flat { color: var(--text3); }

/* Sparkline */
.sparkline-wrap { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
.spark-label-row {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 9px; color: var(--text3);
  margin-bottom: 4px; letter-spacing: .04em;
}
svg.spark { display: block; }

/* ─── CHART ─── */
.chart-section { margin-bottom: 32px; }
.chart-card {
  background: var(--bg1); border: 1px solid var(--line);
  border-radius: var(--r2); overflow: hidden;
}
.chart-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--line);
  flex-wrap: wrap; gap: 10px;
}
.chart-head-left {}
.chart-head-title { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -.01em; }
.chart-head-sub { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: .06em; margin-top: 1px; }
.legend { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text3); cursor: default; }
.legend-pip { width: 20px; height: 2px; border-radius: 1px; }
.chart-body { padding: 16px 20px 20px; height: 260px; position: relative; }

/* ─── TABLE ─── */
.table-section {}
.table-card {
  background: var(--bg1); border: 1px solid var(--line);
  border-radius: var(--r2); overflow: hidden;
}
.table-head-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-bottom: 1px solid var(--line);
  flex-wrap: wrap; gap: 10px;
}
.table-head-title { font-size: 14px; font-weight: 600; color: var(--text); }
.sort-controls { display: flex; align-items: center; gap: 8px; }
.sort-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: .06em; }
.sort-btn {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  padding: 5px 12px; border-radius: var(--r); border: 1px solid var(--line2);
  background: var(--bg2); color: var(--text3); cursor: pointer; transition: all .15s;
  letter-spacing: .04em;
}
.sort-btn:hover { color: var(--text2); border-color: var(--line2); background: var(--bg3); }
.sort-btn.active { background: var(--bg3); color: var(--accent); border-color: var(--accent); }

table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid var(--line); }
th {
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  color: var(--text3); letter-spacing: .12em; text-transform: uppercase;
  text-align: left; padding: 10px 16px; white-space: nowrap;
  cursor: pointer; user-select: none; transition: color .15s;
}
th:hover { color: var(--text2); }
th.sorted { color: var(--accent); }
th .sort-arrow { margin-left: 4px; opacity: .6; }
td { padding: 12px 16px; border-bottom: 1px solid var(--line); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tbody tr { transition: background .12s; }
tbody tr:hover td { background: var(--bg2); }

.td-rank { font-family: var(--mono); font-size: 11px; color: var(--text3); width: 44px; }
.td-rank.r1 { color: var(--accent); font-weight: 700; }
.td-brand-cell { display: flex; align-items: center; gap: 10px; }
.td-logo {
  width: 32px; height: 32px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; border: 1px solid var(--line2); overflow: hidden;
  background: #0d0d0d;
}
.td-brand-name { font-size: 13px; font-weight: 600; color: var(--text); }
.td-price { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--text); }
.td-price.best { color: var(--accent); }
.td-change-up   { font-family: var(--mono); font-size: 12px; color: var(--up);   }
.td-change-down { font-family: var(--mono); font-size: 12px; color: var(--down); }
.td-change-flat { font-family: var(--mono); font-size: 12px; color: var(--text3); }
.td-sub { font-family: var(--mono); font-size: 11px; color: var(--text3); }

/* divider between sections */
.section-divider { height: 1px; background: var(--line); margin: 40px 0; }

/* loading */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; gap: 14px; }
.loader { width: 28px; height: 28px; border: 1px solid var(--line2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.load-txt { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: .1em; }

/* no data */
.no-data-msg { font-family: var(--mono); font-size: 11px; color: var(--text3); text-align: center; padding: 40px; }

@media (max-width: 900px) {
  .overview-grid { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 640px) {
  header { padding: 0 18px; }
  .wrap  { padding: 20px 18px 48px; }
  .overview-grid { grid-template-columns: repeat(2, 1fr); }
  .cards-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .brand-card { padding: 14px 14px 12px; }
  .price-value { font-size: 22px; }
  th:nth-child(5), td:nth-child(5),
  th:nth-child(6), td:nth-child(6) { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⛽</div>
    <div>
      <div class="logo-text-main">ราคาน้ำมันไทย</div>
      <div class="logo-text-sub">Thailand Fuel Price Tracker</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="pulse"></div>
      <span>LIVE</span>
    </div>
    <div class="update-time" id="updateTime">—</div>
  </div>
</header>

<div class="wrap">
  <div id="app">
    <div class="loading">
      <div class="loader"></div>
      <div class="load-txt">LOADING PRICES…</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

/* ════════════════════════════════
   DATA HELPERS
════════════════════════════════ */
async function loadData() {
  try {
    const r = await fetch(`prices.json?t=${Date.now()}`);
    if (r.ok) { liveData = await r.json(); isLive = true; }
  } catch(_) {}
  try {
    const r2 = await fetch(`price_history.json?t=${Date.now()}`);
    if (r2.ok) historyData = await r2.json();
  } catch(_) {}
  if (!liveData) { liveData = mockLatest(); historyData = mockHistory(); }
}

function getDays() { return currentTime==='day'?2:currentTime==='week'?7:30; }

function historySlice(oilId, brandId, days) {
  const dates = Object.keys(historyData).sort().slice(-days);
  return dates.map(d => historyData[d]?.[oilId]?.[brandId] ?? null);
}

function dateLabels(days) {
  const dates = Object.keys(historyData).sort().slice(-days);
  if (!dates.length) {
    return Array.from({length:days},(_,i)=>{
      const d=new Date(); d.setDate(d.getDate()-(days-1-i));
      return `${d.getDate()}/${d.getMonth()+1}`;
    });
  }
  return dates.map(d=>{ const p=d.split('-'); return `${+p[2]}/${+p[1]}`; });
}

function getYesterdayPrice(oilId, brandId) {
  const allDates = Object.keys(historyData).sort();
  const ydKey = allDates[allDates.length-2];
  return historyData[ydKey]?.[oilId]?.[brandId] ?? null;
}

        <div class="chart-head">
          <div class="chart-head-left">
            <div class="chart-head-title" id="chartTitle">กราฟเปรียบเทียบ</div>
            <div class="chart-head-sub" id="chartSub">PRICE COMPARISON</div>
          </div>
          <div class="legend" id="chartLegend"></div>
        </div>
        <div class="chart-body"><canvas id="priceChart"></canvas></div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-section">
      <div class="table-card">
        <div class="table-head-bar">
          <div class="table-head-title">อันดับราคา — <span id="tableOilLabel" style="color:var(--accent)">${OIL_TYPES[0].label}</span></div>
          <div class="sort-controls">
            <span class="sort-label">เรียงตาม</span>
            <button class="sort-btn active" id="sortPrice" onclick="setSort('price')">PRICE</button>
            <button class="sort-btn" id="sortChange" onclick="setSort('change')">CHANGE</button>
            <button class="sort-btn" id="sortBrand" onclick="setSort('brand')">BRAND</button>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th onclick="setSort('rank')">#</th>
              <th onclick="setSort('brand')">แบรนด์ <span class="sort-arrow" id="arr-brand"></span></th>
              <th onclick="setSort('price')">ราคา <span class="sort-arrow" id="arr-price">↑</span></th>
              <th onclick="setSort('change')">เปลี่ยนแปลง <span class="sort-arrow" id="arr-change"></span></th>
              <th>ต่ำสุด 7 วัน</th>
              <th>สูงสุด 7 วัน</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  `;

  buildOilTabs();
  renderOverview();
  render();
}

/* ════════════════════════════════
   OIL TABS
════════════════════════════════ */
function buildOilTabs() {
  const el = document.getElementById('oilTabs');
  OIL_TYPES.forEach((o,i) => {
    const btn = document.createElement('button');
    btn.className = 'oil-tab' + (i===0?' active':'');
    btn.textContent = o.label;
    btn.onclick = () => {
      document.querySelectorAll('.oil-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentOil = o.id;
      document.getElementById('oilLabel').textContent      = o.label;
      document.getElementById('tableOilLabel').textContent = o.label;
      render();
    };
    el.appendChild(btn);
  });
}

/* ════════════════════════════════
   OVERVIEW GRID (today's prices all oil types)
════════════════════════════════ */
function renderOverview() {
  const grid = document.getElementById('overviewGrid');
  grid.innerHTML = '';

  OIL_TYPES.forEach(oil => {
    const cell = document.createElement('div');
    cell.className = 'overview-cell';

    // find cheapest brand today
    let minPrice = Infinity, minBrand = null;
    BRANDS.forEach(b => {
      const p = liveData.prices?.[oil.id]?.[b.id];
      if (p != null && p < minPrice) { minPrice = p; minBrand = b; }
    });

    const brandRows = BRANDS.map(b => {
      const p = liveData.prices?.[oil.id]?.[b.id];
      if (p == null) return '';
      const isBest = minBrand && b.id === minBrand.id;
      return `<div class="ov-brand-row">
        <span class="ov-brand-name">
          <span class="ov-brand-dot" style="background:${b.color}"></span>
          ${b.name}
        </span>
        <span class="ov-price${isBest?' best':''}">${p.toFixed(2)}</span>
      </div>`;
    }).join('');

    cell.innerHTML = `
      <div class="ov-oil-name">${oil.label}</div>
      ${brandRows}
      ${minBrand ? `
        <div class="ov-divider"></div>
        <div class="ov-best-label">CHEAPEST</div>
        <div class="ov-best-val">
          <div style="display:flex;align-items:center;gap:7px;margin-top:4px">
            <div style="width:24px;height:24px;border-radius:5px;overflow:hidden;flex-shrink:0;border:1px solid var(--line2)">${LOGOS[minBrand.id]||''}</div>
            <span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent)">${minBrand.name} · ${minPrice.toFixed(2)}฿</span>
          </div>
        </div>
      ` : ''}
    `;
    grid.appendChild(cell);
  });
}

/* ════════════════════════════════
   SORT
════════════════════════════════ */
function setSort(key) {
  if (sortKey === key) { sortAsc = !sortAsc; }
  else { sortKey = key; sortAsc = key !== 'change'; }
  // update buttons
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  const map = {price:'sortPrice',change:'sortChange',brand:'sortBrand'};
  if (map[key]) document.getElementById(map[key])?.classList.add('active');
  // update arrows
  ['price','change','brand'].forEach(k => {
    const el = document.getElementById(`arr-${k}`);
    if (el) el.textContent = sortKey===k ? (sortAsc?'↑':'↓') : '';
  });
  renderTable();
}

function setTime(t, el) {
  currentTime = t;
  document.querySelectorAll('.time-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() { renderCards(); renderChart(); renderTable(); }

/* ════════════════════════════════
   BRAND CARDS
════════════════════════════════ */
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  const days = getDays();

  BRANDS.forEach(b => {
    const today = liveData.prices?.[currentOil]?.[b.id];
    const yd    = getYesterdayPrice(currentOil, b.id);
    const hist  = historySlice(currentOil, b.id, days).filter(v=>v!=null);
    const price = today ?? hist[hist.length-1];
    if (price == null) return;

    const diff  = (today!=null && yd!=null) ? +(today-yd).toFixed(2) : 0;
    const isUp  = diff > 0, isDn = diff < 0;

    let chip, valClass, deltaStr;
    if (isUp)      { chip=`<span class="chip chip-up">▲ +${diff}</span>`;  valClass='val-up';   deltaStr=`+${diff}`; }
    else if (isDn) { chip=`<span class="chip chip-down">▼ ${diff}</span>`; valClass='val-down'; deltaStr=`${diff}`; }
    else           { chip=`<span class="chip chip-flat">— คงที่</span>`;   valClass='val-flat'; deltaStr='0.00'; }

    // Sparkline
    let sparkHTML = '';
    if (hist.length > 1) {
      const W=180, H=40;
      const mn=Math.min(...hist), mx=Math.max(...hist), rng=mx-mn||.01;
      const pts = hist.map((v,i)=>`${(i/(hist.length-1))*W},${H-2-((v-mn)/rng)*(H-6)}`).join(' ');
      const lineCol = isUp?'var(--up)':isDn?'var(--down)':'var(--text3)';
      const firstPt = pts.split(' ')[0];
      const lastPt  = pts.split(' ').slice(-1)[0];
      sparkHTML = `
        <div class="sparkline-wrap">
          <div class="spark-label-row">
            <span>${mn.toFixed(2)}</span>
            <span>${mx.toFixed(2)}</span>
          </div>
          <svg class="spark" viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none">
            <defs>
              <linearGradient id="g_${b.id}" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="${lineCol}" stop-opacity=".15"/>
                <stop offset="100%" stop-color="${lineCol}" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <polygon points="${firstPt} ${pts} ${lastPt.split(',')[0]},${H} 0,${H}" fill="url(#g_${b.id})"/>
            <polyline points="${pts}" fill="none" stroke="${lineCol}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>`;
    }

    const card = document.createElement('div');
    card.className = 'brand-card';
    card.innerHTML = `
      <div class="card-header">
        <div class="brand-identity">
          <div class="brand-logo-wrap">${LOGOS[b.id]||''}</div>
          <div class="brand-info">
            <div class="brand-name-text">${b.name}</div>
            <div class="brand-name-sub">${b.sub}</div>
          </div>
        </div>
        ${chip}
      </div>
      <div class="card-price-section">
        <div class="price-value">
          ${price.toFixed(2)}
          <span class="price-unit">บาท/ลิตร</span>
        </div>
        <div class="price-change-row">
          <span class="price-change-label">จากเมื่อวาน</span>
          <span class="price-change-val ${valClass}">${deltaStr}</span>
        </div>
      </div>
      ${sparkHTML}
    `;
    grid.appendChild(card);
  });

  if (!grid.children.length) {
    grid.innerHTML = `<div class="no-data-msg" style="grid-column:1/-1">ไม่มีข้อมูล</div>`;
  }
}

/* ════════════════════════════════
   CHART
════════════════════════════════ */
function renderChart() {
  const days = getDays();
  const labels = dateLabels(days);
  const datasets = BRANDS.map(b => ({
    label: b.name,
    data: historySlice(currentOil, b.id, days),
    borderColor: b.color,
    borderWidth: 1.5,
    pointRadius: days<=2?4:0,
    pointHoverRadius: 5,
    tension: 0.35,
    fill: false,
    spanGaps: true,
  }));

  const ctx = document.getElementById('priceChart').getContext('2d');
  if (chartInst) chartInst.destroy();
  chartInst = new Chart(ctx, {
    type: 'line', data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display:false },
        tooltip: {
          backgroundColor:'#1c1c1c', borderColor:'#2a2a2a', borderWidth:1,
          titleColor:'#555', titleFont:{family:'JetBrains Mono',size:10},
          bodyColor:'#ececec', bodyFont:{family:'JetBrains Mono',size:11},
          padding:12,
          callbacks: { label: c=>`  ${c.dataset.label.padEnd(7)} ${c.parsed.y?.toFixed(2)??'—'} ฿` }
        }
      },
      scales: {
        x: { grid:{color:'#181818'}, ticks:{color:'#404040',font:{family:'JetBrains Mono',size:10},maxRotation:0}, border:{color:'#202020'} },
        y: { grid:{color:'#181818'}, ticks:{color:'#404040',font:{family:'JetBrains Mono',size:10},callback:v=>v.toFixed(2)}, border:{color:'#202020'} }
      }
    }
  });

  // legend
  const leg = document.getElementById('chartLegend');
  leg.innerHTML = '';
  BRANDS.forEach(b => {
    const el = document.createElement('div');
    el.className = 'legend-item';
    el.innerHTML = `<div class="legend-pip" style="background:${b.color}"></div>${b.name}`;
    leg.appendChild(el);
  });

  const oil = OIL_TYPES.find(o=>o.id===currentOil);
  const tl  = currentTime==='day'?'1 วัน':currentTime==='week'?'7 วัน':'30 วัน';
  document.getElementById('chartTitle').textContent = `${oil?.label} — เปรียบเทียบทุกแบรนด์`;
  document.getElementById('chartSub').textContent   = `PRICE COMPARISON · ${tl.toUpperCase()}`;
}

/* ════════════════════════════════
   TABLE
════════════════════════════════ */
function renderTable() {
  const tbody = document.getElementById('tbody');

  let rows = BRANDS.map(b => {
    const today = liveData.prices?.[currentOil]?.[b.id];
    const yd    = getYesterdayPrice(currentOil, b.id);
    const last7 = historySlice(currentOil, b.id, 7).filter(v=>v!=null);
    return {
      b,
      today: today ?? last7[last7.length-1],
      diff:  (today!=null&&yd!=null) ? +(today-yd).toFixed(2) : 0,
      min7:  last7.length?Math.min(...last7):null,
      max7:  last7.length?Math.max(...last7):null,
    };
  }).filter(r=>r.today!=null);

  // sort
  rows.sort((a,b) => {
    let va, vb;
    if      (sortKey==='price')  { va=a.today;          vb=b.today; }
    else if (sortKey==='change') { va=a.diff;            vb=b.diff; }
    else if (sortKey==='brand')  { va=a.b.name.toLowerCase(); vb=b.b.name.toLowerCase(); }
    else                         { va=a.today;           vb=b.today; }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ?  1 : -1;
    return 0;
  });

  tbody.innerHTML = '';
  rows.forEach((r,i) => {
    let changeCell;
    if (r.diff>0)      changeCell=`<td class="td-change-up">▲ +${r.diff.toFixed(2)}</td>`;
    else if (r.diff<0) changeCell=`<td class="td-change-down">▼ ${r.diff.toFixed(2)}</td>`;
    else               changeCell=`<td class="td-change-flat">—</td>`;

    const isBest = sortKey==='price' && sortAsc && i===0;
    const rankTxt = isBest ? '★' : String(i+1).padStart(2,'0');

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-rank${isBest?' r1':''}">${rankTxt}</td>
      <td>
        <div class="td-brand-cell">
          <div class="td-logo">${LOGOS[r.b.id]||''}</div>
          <div>
            <div class="td-brand-name">${r.b.name}</div>
            <div style="font-size:11px;color:var(--text3)">${r.b.sub}</div>
          </div>
        </div>
      </td>
      <td class="td-price${isBest?' best':''}">${r.today.toFixed(2)}<span style="font-size:10px;color:var(--text3);font-family:var(--sans);margin-left:3px">฿</span></td>
      ${changeCell}
      <td class="td-sub">${r.min7?.toFixed(2)??'—'}</td>
      <td class="td-sub">${r.max7?.toFixed(2)??'—'}</td>
    `;
    tbody.appendChild(tr);
  });
}

/* ════════════════════════════════
   MOCK DATA
════════════════════════════════ */
function mockLatest() {
  const BASE={g95:39.95,g91:37.45,e20:35.65,e85:25.30,diesel:30.94,diesel_premium:33.94,premium:44.95};
  const OFF={PTT:0,Shell:.10,Caltex:.05,Esso:.08,BCP:-.05,Susco:-.12};
  const prices={};
  OIL_TYPES.forEach(o=>{ prices[o.id]={}; BRANDS.forEach(b=>{ prices[o.id][b.id]=+(BASE[o.id]+OFF[b.id]).toFixed(2); }); });
  return {updated:'ข้อมูลตัวอย่าง — รัน scraper เพื่อดูราคาจริง',date:new Date().toISOString().slice(0,10),prices};
}
function mockHistory() {
  const BASE={g95:39.95,g91:37.45,e20:35.65,e85:25.30,diesel:30.94,diesel_premium:33.94,premium:44.95};
  const OFF={PTT:0,Shell:.10,Caltex:.05,Esso:.08,BCP:-.05,Susco:-.12};
  let h=123456789; const rng=()=>{h^=h<<13;h^=h>>17;h^=h<<5;return(h>>>0)/4294967296;};
  const hist={};
  const brandState={};
  BRANDS.forEach(b=>{ brandState[b.id]={}; OIL_TYPES.forEach(o=>{ brandState[b.id][o.id]=BASE[o.id]+OFF[b.id]; }); });
  for(let i=29;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    hist[k]={};
    OIL_TYPES.forEach(o=>{
      hist[k][o.id]={};
      BRANDS.forEach(b=>{
        if(rng()<.12) brandState[b.id][o.id]=+(brandState[b.id][o.id]+(rng()-.5)*.8).toFixed(2);
        hist[k][o.id][b.id]=+brandState[b.id][o.id].toFixed(2);
      });
    });
  }
  return hist;
}
